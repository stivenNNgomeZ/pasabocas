<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnackZone - Iniciar Sesión</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <i class="fas fa-cookie-bite"></i>
        <h1>SnackZone</h1>
        <p>Ingresa para continuar</p>
      </div>

      <div class="auth-form" id="login-form-view">
        <div class="form-group">
          <label><i class="fas fa-envelope"></i> Email</label>
          <input type="email" id="login-email" placeholder="tu@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label><i class="fas fa-lock"></i> Contraseña</label>
          <input type="password" id="login-password" placeholder="••••••" autocomplete="current-password">
        </div>
        <button class="btn btn-primary btn-block btn-lg" onclick="procesarLoginInline()">
          <i class="fas fa-sign-in-alt"></i> Ingresar
        </button>
        <div class="divider"><span>O</span></div>
        <a href="/api/auth/google" class="btn btn-google btn-block btn-lg">
          <i class="fab fa-google"></i> Iniciar sesión con Google
        </a>
        <p class="auth-switch">¿No tienes cuenta? <a href="#" onclick="toggleLoginRegister(); return false">Regístrate</a></p>
      </div>

      <div class="auth-form" id="register-form-view" style="display:none">
        <div class="form-group">
          <label><i class="fas fa-user"></i> Nombre completo</label>
          <input type="text" id="reg-nombre" placeholder="Ej: Juan Pérez">
        </div>
        <div class="form-group">
          <label><i class="fas fa-envelope"></i> Email</label>
          <input type="email" id="reg-email" placeholder="tu@email.com">
        </div>
        <div class="form-group">
          <label><i class="fas fa-lock"></i> Contraseña</label>
          <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres">
        </div>
        <div class="form-group">
          <label><i class="fas fa-tag"></i> Tipo de cuenta</label>
          <select id="reg-rol">
            <option value="usuario">Cliente - Quiero comprar</option>
            <option value="vendedor">Vendedor - Quiero gestionar</option>
          </select>
        </div>
        <button class="btn btn-primary btn-block btn-lg" onclick="procesarRegisterInline()">
          <i class="fas fa-user-plus"></i> Crear cuenta
        </button>
        <p class="auth-switch">¿Ya tienes cuenta? <a href="#" onclick="toggleLoginRegister(); return false">Inicia sesión</a></p>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
